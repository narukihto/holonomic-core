name: ARK-Penta-V Sovereign Integrity Pipeline

on:
  push:
    branches: [ clod ]
  pull_request:
    branches: [ clod ]

env:
  CARGO_TERM_COLOR: always
  # فرض صرامة تامة على الكود ومنع أي تجاوزات في الذاكرة
  RUSTFLAGS: "-D warnings -C target-feature=+crt-static -C link-arg=-s"

jobs:
  sovereign-verification:
    name: Formal Mathematical and Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Sovereign State
        uses: actions/checkout@v4

      - name: Setup Sovereign Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Build Dependencies
        uses: swatinem/rust-cache@v2

      - name: Audit Formal Syntax (Rustfmt)
        run: cargo fmt --all -- --check

      - name: Zero-Tolerance Static Analysis (Clippy)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Mathematical Integrity and Invariant Verification
        run: cargo test --verbose

      - name: Sovereign Stress Test (High-Load Stability)
        run: |
          # اختبار استقرار المانيفولد تحت ضغط عالي (Stress Testing)
          # هذا يضمن أن النظام لا ينهار في فضاءات الأبعاد العالية
          cargo test --test holonomic_tests -- --ignored --nocapture

      - name: Sovereign Release Build
        run: cargo build --release --verbose

      - name: Security Audit (LWE Compliance Check)
        run: |
          # التحقق من أن طبقة التشفير LWE سليمة ولم تتعرض للتهكير
          cargo run --example lwe_compliance_test
