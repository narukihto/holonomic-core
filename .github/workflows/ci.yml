name: Absolute SSDT-Kernel Continuous Integration

on:
  push:
    branches: [ clod, master ]
  pull_request:
    branches: [ clod, master ]

env:
  CARGO_TERM_COLOR: always
  # Force the compiler to treat all warnings as hard errors to enforce absolute production code purity
  RUSTFLAGS: "-D warnings"

jobs:
  manifold-verification-pipeline:
    name: Codebase Security and Mathematical Verification Pipeline
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository State
      uses: actions/checkout@v4

    - name: Setup Latest Production Rust Stable Toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt

    - name: Cache Build Dependencies to Maximize Pipeline Speed
      uses: swatinem/rust-cache@v2

    - name: Verify Formal Formatting Guidelines (Rustfmt Check)
      run: cargo fmt --all -- --check

    - name: Static Analysis via Clippy Linter (Zero-Warning Enforcement)
      run: cargo clippy --all-targets --all-features

    - name: Verify Syntactic Soundness and Target Compilations
      run: cargo check --verbose

    - name: Execute Parallel Mathematical and Data-Race Test Suites
      run: cargo test --verbose
